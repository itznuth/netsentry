services:
  mock-web:
    build: ./services/mock-web
    ports:
      - "8080:8080"

  suricata:
    image: jasonish/suricata:latest
    command: ["-T", "-c", "/etc/suricata/suricata.yaml"]
    volumes:
      - ./config/suricata.yaml:/etc/suricata/suricata.yaml
      - ./rules:/var/lib/suricata/rules
      - ./results:/var/log/suricata
